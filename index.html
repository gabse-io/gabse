    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function createParticles() {
        particles = [];
        for (let i = 0; i < 80; i++) {
            particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, radius: Math.random() * 2 + 1, speedX: (Math.random() - 0.5) * 0.5, speedY: (Math.random() - 0.5) * 0.3 + 0.2, alpha: Math.random() * 0.5 + 0.2 });
        }
    }
    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#0A0F1A';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.x += p.speedX; p.y += p.speedY;
            if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
            if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(45, 156, 124, ${p.alpha})`;
            ctx.fill();
            particles.forEach(p2 => {
                const dx = p.x - p2.x, dy = p.y - p2.y, dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 100) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.strokeStyle = `rgba(45, 156, 124, ${0.1 * (1 - dist / 100)})`; ctx.stroke(); }
            });
        });
        requestAnimationFrame(animateParticles);
    }
    window.addEventListener('resize', () => { resizeCanvas(); createParticles(); });
    resizeCanvas(); createParticles(); animateParticles();

    function initBidirectionalScrollReveal() { /* ... función existente ... */
        const elementsToObserve = [
            ...document.querySelectorAll('.exp-block'),
            ...document.querySelectorAll('.project-card'),
            ...document.querySelectorAll('.section-title'),
            ...document.querySelectorAll('.timeline-node'),
            document.getElementById('footer')
        ].filter(el => el !== null);
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const target = entry.target;
                const isVisible = entry.isIntersecting;
                const ratio = entry.intersectionRatio;
                if (isVisible && ratio >= 0.15) {
                    target.classList.remove('hidden-up');
                    target.classList.add('revealed');
                } else if (!isVisible || ratio < 0.1) {
                    target.classList.remove('revealed');
                    target.classList.add('hidden-up');
                }
            });
        }, { threshold: [0, 0.1, 0.15, 0.5, 0.8, 1], rootMargin: '0px 0px -50px 0px' });
        elementsToObserve.forEach(el => observer.observe(el));
    }

    const carouselTrack = document.getElementById('projectsCarousel');
    const prevBtn = document.getElementById('prevBtn');

    function scrollCarousel(direction) {
